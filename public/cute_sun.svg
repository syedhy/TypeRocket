<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Sun Rays -->
  <g fill="#f59e0b">
    <polygon points="100,10 115,40 85,40" />
    <polygon points="100,190 115,160 85,160" />
    <polygon points="10,100 40,85 40,115" />
    <polygon points="190,100 160,85 160,115" />
    
    <polygon points="35,35 60,50 45,65" />
    <polygon points="165,165 140,150 155,135" />
    <polygon points="165,35 140,50 155,65" />
    <polygon points="35,165 60,150 45,135" />
  </g>
  
  <!-- Sun Body -->
  <circle cx="100" cy="100" r="50" fill="#fbbf24"/>
  <circle cx="100" cy="100" r="45" fill="#fcd34d"/>
  
  <!-- Sunglasses -->
  <path d="M 65 90 L 135 90 C 135 105, 120 110, 110 100 L 100 95 L 90 100 C 80 110, 65 105, 65 90 Z" fill="#1e293b"/>
  <path d="M 60 90 L 140 90" fill="none" stroke="#0f172a" stroke-width="4" stroke-linecap="round"/>
  <!-- Sunglasses Reflection -->
  <path d="M 70 95 L 85 95" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
  <path d="M 115 95 L 130 95" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Smile -->
  <path d="M 85 115 Q 100 125 115 115" fill="none" stroke="#d97706" stroke-width="4" stroke-linecap="round"/>
</svg>
