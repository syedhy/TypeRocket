<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Backpack -->
  <rect x="50" y="60" width="100" height="90" rx="15" fill="#e2e8f0" stroke="#475569" stroke-width="6"/>
  <rect x="60" y="70" width="80" height="20" rx="5" fill="#cbd5e1"/>
  
  <!-- Body -->
  <rect x="65" y="100" width="70" height="60" rx="20" fill="#ffffff" stroke="#475569" stroke-width="6"/>
  <!-- Stripes -->
  <rect x="65" y="120" width="70" height="10" fill="#ef4444"/>
  <rect x="65" y="135" width="70" height="10" fill="#3b82f6"/>
  
  <!-- Arms -->
  <path d="M 65 110 C 30 110, 30 150, 50 150" fill="none" stroke="#475569" stroke-width="26" stroke-linecap="round"/>
  <path d="M 65 110 C 30 110, 30 150, 50 150" fill="none" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>
  
  <path d="M 135 110 C 170 110, 170 150, 150 150" fill="none" stroke="#475569" stroke-width="26" stroke-linecap="round"/>
  <path d="M 135 110 C 170 110, 170 150, 150 150" fill="none" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>
  
  <!-- Legs -->
  <path d="M 80 155 L 70 180" fill="none" stroke="#475569" stroke-width="26" stroke-linecap="round"/>
  <path d="M 80 155 L 70 180" fill="none" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>
  
  <path d="M 120 155 L 130 180" fill="none" stroke="#475569" stroke-width="26" stroke-linecap="round"/>
  <path d="M 120 155 L 130 180" fill="none" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>

  <!-- Helmet base -->
  <circle cx="100" cy="70" r="45" fill="#ffffff" stroke="#475569" stroke-width="6"/>
  
  <!-- Visor -->
  <path d="M 65 70 C 65 40, 135 40, 135 70 C 135 100, 65 100, 65 70 Z" fill="#38bdf8" stroke="#0ea5e9" stroke-width="4"/>
  
  <!-- Visor Reflection -->
  <path d="M 75 60 C 85 50, 115 50, 125 60 C 115 55, 85 55, 75 60 Z" fill="#bae6fd" opacity="0.8"/>
  
  <!-- Cute Face inside visor -->
  <!-- Eyes -->
  <circle cx="85" cy="70" r="4" fill="#0f172a"/>
  <circle cx="115" cy="70" r="4" fill="#0f172a"/>
  <!-- Blush -->
  <ellipse cx="75" cy="75" rx="6" ry="3" fill="#ec4899" opacity="0.6"/>
  <ellipse cx="125" cy="75" rx="6" ry="3" fill="#ec4899" opacity="0.6"/>
  <!-- Smile -->
  <path d="M 95 75 Q 100 82 105 75" fill="none" stroke="#0f172a" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Stars/Sparkles -->
  <path d="M 20 40 L 25 30 L 30 40 L 20 40" fill="#fef08a"/>
  <path d="M 170 80 L 175 70 L 180 80 L 170 80" fill="#fef08a"/>
</svg>
