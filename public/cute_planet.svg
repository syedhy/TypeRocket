  <!-- Planet Body -->
  <circle cx="100" cy="90" r="50" fill="#a855f7"/>
  <!-- Planet Craters/Spots -->
  <circle cx="75" cy="70" r="8" fill="#9333ea" opacity="0.6"/>
  <circle cx="125" cy="65" r="12" fill="#9333ea" opacity="0.6"/>
  <circle cx="110" cy="115" r="10" fill="#9333ea" opacity="0.6"/>
  
  <!-- Cute Face -->
  <circle cx="85" cy="95" r="5" fill="#ffffff"/>
  <circle cx="115" cy="95" r="5" fill="#ffffff"/>
  <path d="M 95 100 Q 100 108 105 100" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <!-- Blush -->
