<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Accretion disk glow back -->
  <ellipse cx="100" cy="100" rx="90" ry="30" fill="none" stroke="#c084fc" stroke-width="15" opacity="0.6" transform="rotate(15 100 100)"/>
  <ellipse cx="100" cy="100" rx="70" ry="20" fill="none" stroke="#38bdf8" stroke-width="10" opacity="0.8" transform="rotate(15 100 100)"/>

  <!-- Event Horizon -->
  <circle cx="100" cy="100" r="45" fill="#0f172a"/>
  
  <!-- Accretion disk front -->
  <path d="M 10 100 A 90 30 0 0 0 190 100" fill="none" stroke="#d8b4fe" stroke-width="10" stroke-linecap="round" transform="rotate(15 100 100)"/>
  
  <!-- Stars getting sucked in -->
  <circle cx="40" cy="70" r="3" fill="#fef08a"/>
  <path d="M 40 70 Q 70 80 80 90" fill="none" stroke="#fef08a" stroke-width="1" stroke-dasharray="2,2"/>
  
  <circle cx="160" cy="130" r="4" fill="#67e8f9"/>
  <path d="M 160 130 Q 130 120 120 110" fill="none" stroke="#67e8f9" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Cute Face -->
  <!-- Eyes wide open, hungry -->
  <circle cx="85" cy="100" r="8" fill="#ffffff"/>
  <circle cx="115" cy="100" r="8" fill="#ffffff"/>
  <circle cx="85" cy="100" r="3" fill="#0f172a"/>
  <circle cx="115" cy="100" r="3" fill="#0f172a"/>
  
  <!-- Drooling/Happy open mouth -->
  <path d="M 90 115 Q 100 130 110 115 Z" fill="#ec4899"/>
</svg>
