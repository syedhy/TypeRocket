<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Comet Tail -->
  <path d="M 60 100 Q 20 120, 10 180 Q 50 160, 80 120 Z" fill="#7dd3fc" opacity="0.8"/>
  <path d="M 70 100 Q 30 110, 25 150 Q 50 140, 85 110 Z" fill="#38bdf8" opacity="0.9"/>
  <path d="M 80 100 Q 40 100, 45 130 Q 60 120, 90 105 Z" fill="#0284c7" opacity="0.9"/>
  
  <!-- Sparkles -->
  <circle cx="30" cy="140" r="2" fill="#ffffff"/>
  <circle cx="50" cy="160" r="3" fill="#ffffff"/>
  <circle cx="20" cy="165" r="1.5" fill="#ffffff"/>
  
  <!-- Comet Core (Ice Rock) -->
  <path d="M 90 70 C 110 50, 150 50, 160 80 C 170 110, 130 140, 110 120 C 90 100, 70 90, 90 70 Z" fill="#e0f2fe"/>
  
  <!-- Craters / Ice chunks -->
  <path d="M 140 75 Q 145 80 140 85 Q 135 80 140 75 Z" fill="#bae6fd"/>
  <path d="M 120 115 Q 125 120 120 125 Q 115 120 120 115 Z" fill="#bae6fd"/>
  <path d="M 100 80 Q 105 85 100 90 Q 95 85 100 80 Z" fill="#bae6fd"/>

  <!-- Cute Face -->
  <!-- Eyes -->
  <circle cx="130" cy="95" r="4" fill="#0f172a"/>
  <circle cx="145" cy="100" r="4" fill="#0f172a"/>
  
  <!-- Blush -->
  <ellipse cx="120" cy="100" rx="5" ry="2.5" fill="#f472b6" opacity="0.7" transform="rotate(-15 120 100)"/>
  <ellipse cx="155" cy="105" rx="5" ry="2.5" fill="#f472b6" opacity="0.7" transform="rotate(-15 155 105)"/>
  
  <!-- Smile -->
  <path d="M 135 105 Q 138 110 142 107" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round"/>
</svg>
